<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>s3g-mc Spatial Score</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage">
        <header class="topbar">
          <div>
            <h1>s3g-mc Spatial Score</h1>
            <p>Spatial motion designer for 8-source 3OA encoder banks</p>
          </div>
          <div class="transport">
            <button id="play" type="button" title="Play">▶</button>
            <button id="stop" type="button" title="Stop">■</button>
            <button id="importJson" type="button" title="Import JSON">Import</button>
            <button id="exportJson" type="button" title="Export JSON">Export</button>
            <button id="recordClip" type="button" title="Record canvas clip">Record</button>
            <button id="fullscreenView" type="button" title="Fullscreen View">View</button>
            <input id="jsonFile" type="file" accept="application/json,.json" hidden />
          </div>
        </header>
        <button id="closeFullscreen" class="close-fullscreen" type="button">Close View</button>
        <canvas id="view" width="1100" height="760"></canvas>
        <div class="statusbar">
          <span id="timeReadout">0.00s</span>
          <span id="analysisReadout">centroid 0 / 0 / 1.00 | spread 0.00 | activity 0.00</span>
        </div>
      </section>
      <aside class="panel">
        <section>
          <h2>Source Groups</h2>
          <div class="row two">
            <button id="addBank" type="button">Add Group</button>
            <button id="deleteBank" type="button">Delete Group</button>
          </div>
          <div id="bankList" class="bank-list"></div>
        </section>
        <section>
          <h2 id="motionSceneTitle">Motion Scene A</h2>
          <div class="scene-grid" id="sceneGrid"></div>
          <label>Motion scene name <input id="sceneName" type="text" value="A" /></label>
          <label class="hidden-control">Morph target
            <select id="morphTarget">
              <option value="a">A</option>
              <option value="b">B</option>
              <option value="c">C</option>
              <option value="d">D</option>
              <option value="e">E</option>
              <option value="f">F</option>
              <option value="g">G</option>
              <option value="h">H</option>
            </select>
          </label>
          <label>Morph s <span id="morphDurationValue" class="value-readout">4.0s</span><input id="morphDuration" type="range" min="0.1" max="30" value="4" step="0.1" /></label>
          <label>Hold s <span id="sceneHoldValue" class="value-readout">1.0s</span><input id="sceneHold" type="range" min="0" max="30" value="1" step="0.1" /></label>
          <div class="row one">
            <button id="storeScene" type="button">Capture Motion</button>
          </div>
          <button id="morphScene" type="button">Move Next</button>
          <label class="check"><input id="autoNext" type="checkbox" checked /> Auto Next</label>
          <label class="check"><input id="sceneLoop" type="checkbox" checked /> Loop Motion Scenes</label>
        </section>
        <section>
          <h2>Motion</h2>
          <div class="row two compact-row">
            <button id="randomScene" type="button">Generate</button>
            <button id="generateScenes" type="button">Generate A-H</button>
          </div>
          <label class="check"><input id="varySceneBanks" type="checkbox" /> Vary motion banks</label>
          <label class="check"><input id="randomMorphTime" type="checkbox" checked /> Random morph time</label>
          <label>Motion bank
            <select id="bankMode">
              <option value="manual">Manual</option>
              <option value="orbit">Orbit</option>
              <option value="weave">Weave</option>
              <option value="lattice">Lattice</option>
              <option value="frame">Frame</option>
              <option value="trace">Trace</option>
              <option value="pulse">Pulse</option>
              <option value="suspend">Suspend</option>
              <option value="leap">Leap</option>
              <option value="field">Field</option>
              <option value="molec">Molecular</option>
              <option value="fluid">Fluid</option>
              <option value="forsy">Forsy</option>
              <option value="flock">Flock</option>
              <option value="eco">Eco</option>
              <option value="contact">Contact</option>
              <option value="march">March</option>
              <option value="procession">Procession</option>
              <option value="xenak">Xenak</option>
              <option value="cardew">Cardew</option>
              <option value="path">Path</option>
              <option value="scatter">Scatter</option>
              <option value="physics">Physics</option>
            </select>
          </label>
          <label>Variant
            <select id="sceneMode">
              <option value="primary">Primary</option>
              <option value="alternate">Alternate</option>
              <option value="wide">Wide</option>
              <option value="fold">Fold</option>
              <option value="canon">Canon</option>
              <option value="suspend">Suspend</option>
              <option value="burst">Burst</option>
              <option value="drift">Drift</option>
              <option value="ribbon">Ribbon</option>
              <option value="gate">Gate</option>
              <option value="mirror">Mirror</option>
              <option value="surge">Surge</option>
              <option value="tether">Tether</option>
              <option value="vortex">Vortex</option>
              <option value="yield">Yield</option>
              <option value="still">Still</option>
            </select>
          </label>
          <label>Preview duration s <span id="durationValue" class="value-readout">16.00s</span><input id="duration" type="range" min="1" max="180" value="16" step="0.25" /></label>
          <label>Point rate / s <span id="pointRateValue" class="value-readout">32/s</span><input id="pointRate" type="range" min="4" max="96" value="32" step="1" /></label>
          <div id="pointCountValue" class="value-readout">512 points per source</div>
          <label>Motion <input id="motion" type="range" min="0" max="1" value="0.42" step="0.01" /></label>
          <label>Width <input id="width" type="range" min="0" max="1" value="0.58" step="0.01" /></label>
          <label>Disorder <input id="disorder" type="range" min="0" max="1" value="0.18" step="0.01" /></label>
          <label>Gravity <input id="gravity" type="range" min="0" max="1" value="0.46" step="0.01" /></label>
          <label>Development <input id="development" type="range" min="0" max="1" value="0.35" step="0.01" /></label>
          <label>Topo warp <input id="topoWarp" type="range" min="0" max="1" value="0.18" step="0.01" /></label>
          <label class="physics-only">Attract <input id="physAttract" type="range" min="0" max="1" value="0.32" step="0.01" /></label>
          <label class="physics-only">Repel <input id="physRepel" type="range" min="0" max="1" value="0.42" step="0.01" /></label>
          <label class="physics-only">Bounce <input id="physBounce" type="range" min="0" max="1" value="0.52" step="0.01" /></label>
          <label class="physics-only">Collision <input id="physCollision" type="range" min="0" max="1" value="0.34" step="0.01" /></label>
          <label class="physics-only">Damping <input id="physDamping" type="range" min="0" max="1" value="0.38" step="0.01" /></label>
          <label class="physics-only">Turbulence <input id="physTurbulence" type="range" min="0" max="1" value="0.28" step="0.01" /></label>
          <label class="check"><input id="arcSluiceOn" type="checkbox" /> Arc sluice</label>
          <label class="arc-sluice-only">Arc mode
            <select id="arcSluiceMode">
              <option value="quarter" selected>Quarter Sphere</option>
              <option value="vertical">Vertical Hemisphere</option>
              <option value="diameter">Diameter</option>
              <option value="full">Full Sphere</option>
            </select>
          </label>
          <label class="arc-sluice-only">Arc walls <input id="arcWallCount" type="range" min="1" max="6" value="1" step="1" /></label>
          <label class="arc-sluice-only">Sluice holes <input id="arcSluiceHoles" type="range" min="0" max="4" value="1" step="1" /></label>
          <label class="arc-sluice-only">Sluice size <input id="arcSluiceSize" type="range" min="0" max="1" value="0.55" step="0.01" /></label>
          <label class="arc-sluice-only">Arc azimuth <input id="arcSluiceAzimuth" type="range" min="-180" max="180" value="0" step="1" /></label>
          <label class="arc-sluice-only">Arc dispersion <input id="arcWallSpread" type="range" min="0" max="1" value="0.36" step="0.01" /></label>
          <label class="arc-sluice-only">Arc width <input id="arcWallWidth" type="range" min="0" max="1" value="0.42" step="0.01" /></label>
          <label class="arc-sluice-only">Sluice pull <input id="arcSluicePull" type="range" min="0" max="1" value="0.45" step="0.01" /></label>
          <label class="arc-sluice-only">Spit force <input id="arcSluiceSpit" type="range" min="0" max="1" value="0.34" step="0.01" /></label>
        </section>
        <section>
          <h2>Source</h2>
          <label>Selected source
            <select id="sourceSelect"></select>
          </label>
          <label>Gain <input id="sourceGain" type="range" min="0" max="1.5" value="1" step="0.01" /></label>
          <label>Azimuth <span id="sourceAzimuthValue" class="value-readout">0 deg</span><input id="sourceAzimuth" type="range" min="-180" max="180" value="0" step="1" /></label>
          <label>Elevation <span id="sourceElevationValue" class="value-readout">0 deg</span><input id="sourceElevation" type="range" min="-85" max="85" value="0" step="1" /></label>
          <label>Distance <span id="sourceDistanceValue" class="value-readout">1.00 m</span><input id="sourceDistance" type="range" min="0.1" max="3" value="1" step="0.01" /></label>
          <div class="row two">
            <button id="toggleSource" type="button">Mute Source</button>
            <button id="resetSources" type="button">Reset Sources</button>
          </div>
        </section>
        <section>
          <h2>View / Analysis</h2>
          <div class="row four">
            <button data-view="iso" type="button">3/4</button>
            <button data-view="top" type="button">Top</button>
            <button data-view="front" type="button">Front</button>
            <button data-view="side" type="button">Side</button>
          </div>
          <label>Camera az <input id="cameraAz" type="range" min="-180" max="180" value="-35" step="1" /></label>
          <label>Camera el <input id="cameraEl" type="range" min="-85" max="85" value="36" step="1" /></label>
          <label>Zoom <input id="zoom" type="range" min="0.45" max="2.8" value="1" step="0.01" /></label>
          <label>Spatial constraint
            <select id="spatialConstraint">
              <option value="sphere" selected>Full Sphere</option>
              <option value="hemisphere">Upper Hemisphere</option>
            </select>
          </label>
          <label>Analysis scope
            <select id="analysisScope">
              <option value="global" selected>All Groups</option>
              <option value="active">Active Group</option>
            </select>
          </label>
          <label>Neighbor links <input id="neighborLinks" type="range" min="1" max="6" value="2" step="1" /></label>
          <label>Analysis influence <input id="analysisInfluence" type="range" min="0" max="1" value="0" step="0.01" /></label>
          <label>Centroid pull <input id="centroidPull" type="range" min="-1" max="1" value="0" step="0.01" /></label>
          <label>Spread target <input id="spreadTarget" type="range" min="0.2" max="2.2" value="1.05" step="0.01" /></label>
          <label>Activity damping <input id="activityDamping" type="range" min="0" max="1" value="0.15" step="0.01" /></label>
          <label class="check"><input id="showAnalysis" type="checkbox" checked /> Analysis layer</label>
          <label class="check"><input id="showCentroid" type="checkbox" /> Centroid view</label>
          <label class="check"><input id="showTrails" type="checkbox" /> Path preview</label>
          <label class="check"><input id="showLabels" type="checkbox" /> Labels</label>
        </section>
      </aside>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
